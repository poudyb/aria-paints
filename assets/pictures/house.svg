  <ellipse id="flower2Petal1" class="paint-section" cx="260" cy="318" rx="8" ry="13" fill="#fff" stroke="#111" stroke-width="3.5"/>
  <ellipse id="flower2Petal2" class="paint-section" cx="276" cy="332" rx="8" ry="13" fill="#fff" stroke="#111" stroke-width="3.5" transform="rotate(90 276 332)"/>
  <ellipse id="flower2Petal3" class="paint-section" cx="260" cy="348" rx="8" ry="13" fill="#fff" stroke="#111" stroke-width="3.5" transform="rotate(180 260 348)"/>
  <ellipse id="flower2Petal4" class="paint-section" cx="244" cy="332" rx="8" ry="13" fill="#fff" stroke="#111" stroke-width="3.5" transform="rotate(270 244 332)"/>
  <circle id="flower2Center" class="paint-section" cx="260" cy="334" r="8" fill="#fff" stroke="#111" stroke-width="3.5"/>

