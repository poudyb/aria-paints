  <ellipse id="flower3Petal1" class="paint-section" cx="330" cy="320" rx="8" ry="13" fill="#fff" stroke="#111" stroke-width="3.5"/>
  <ellipse id="flower3Petal2" class="paint-section" cx="346" cy="334" rx="8" ry="13" fill="#fff" stroke="#111" stroke-width="3.5" transform="rotate(90 346 334)"/>
  <ellipse id="flower3Petal3" class="paint-section" cx="330" cy="350" rx="8" ry="13" fill="#fff" stroke="#111" stroke-width="3.5" transform="rotate(180 330 350)"/>
  <ellipse id="flower3Petal4" class="paint-section" cx="314" cy="334" rx="8" ry="13" fill="#fff" stroke="#111" stroke-width="3.5" transform="rotate(270 314 334)"/>
  <circle id="flower3Center" class="paint-section" cx="330" cy="336" r="8" fill="#fff" stroke="#111" stroke-width="3.5"/>

  <!-- Flower 4 (small, right yard) -->
  <path id="flower4Stem" class="paint-section" fill="#fff" stroke="#111" stroke-width="3.5" stroke-linejoin="round"
