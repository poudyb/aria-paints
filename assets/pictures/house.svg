  <circle id="smoke" class="paint-section" cx="266" cy="48" r="14" fill="#fff" stroke="#111" stroke-width="3.5"/>

  <rect id="windowLeft" class="paint-section" x="130" y="216" width="42" height="42" rx="2" fill="#fff" stroke="#111" stroke-width="3.5"/>
  <rect id="windowRight" class="paint-section" x="228" y="216" width="42" height="42" rx="2" fill="#fff" stroke="#111" stroke-width="3.5"/>

  <path id="door" class="paint-section" fill="#fff" stroke="#111" stroke-width="3.5" stroke-linejoin="round"
    d="M 170 300 L 170 246 Q 170 216 200 216 Q 230 216 230 246 L 230 300 Z"/>

  <path id="treeTrunk" class="paint-section" fill="#fff" stroke="#111" stroke-width="3.5" stroke-linejoin="round"
    d="M 64 266 L 64 300 Q 64 310 82 310 L 96 310 Q 114 310 114 300 L 114 266 Q 114 250 88 250 Q 64 250 64 266 Z"/>

  <circle id="treeFoliage1" class="paint-section" cx="74" cy="196" r="50" fill="#fff" stroke="#111" stroke-width="3.5"/>
  <circle id="treeFoliage2" class="paint-section" cx="116" cy="210" r="38" fill="#fff" stroke="#111" stroke-width="3.5"/>

  <!-- Flower 1 -->
  <path id="flower1Stem" class="paint-section" fill="#fff" stroke="#111" stroke-width="3.5" stroke-linejoin="round"
    d="M 144 300 L 144 336 Q 144 342 150 342 L 154 342 Q 160 342 160 336 L 160 300 Z"/>
  <ellipse id="flower1Petal1" class="paint-section" cx="152" cy="316" rx="8" ry="13" fill="#fff" stroke="#111" stroke-width="3.5"/>
  <ellipse id="flower1Petal2" class="paint-section" cx="168" cy="330" rx="8" ry="13" fill="#fff" stroke="#111" stroke-width="3.5" transform="rotate(90 168 330)"/>
  <ellipse id="flower1Petal3" class="paint-section" cx="152" cy="346" rx="8" ry="13" fill="#fff" stroke="#111" stroke-width="3.5" transform="rotate(180 152 346)"/>
  <ellipse id="flower1Petal4" class="paint-section" cx="136" cy="330" rx="8" ry="13" fill="#fff" stroke="#111" stroke-width="3.5" transform="rotate(270 136 330)"/>
  <circle id="flower1Center" class="paint-section" cx="152" cy="332" r="8" fill="#fff" stroke="#111" stroke-width="3.5"/>

