<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" aria-label="House">
  <!-- Back → front paint order -->

  <circle id="sun" class="paint-section" cx="338" cy="54" r="26" fill="#fff" stroke="#111" stroke-width="3.5"/>

  <path id="yard" class="paint-section" fill="#fff" stroke="#111" stroke-width="3.5" stroke-linejoin="round"
    d="M 16 300 L 384 300 L 384 388 Q 384 396 376 396 L 24 396 Q 16 396 16 388 Z"/>

  <path id="path" class="paint-section" fill="#fff" stroke="#111" stroke-width="3.5" stroke-linejoin="round"
    d="M 178 396 L 178 300 L 222 300 L 222 396 Z"/>

  <rect id="houseWall" class="paint-section" x="114" y="196" width="172" height="104" fill="#fff" stroke="#111" stroke-width="3.5"/>

  <path id="roof" class="paint-section" fill="#fff" stroke="#111" stroke-width="3.5" stroke-linejoin="round"
    d="M 98 196 L 200 86 L 302 196 L 290 196 L 200 106 L 110 196 Z"/>

  <path id="chimney" class="paint-section" fill="#fff" stroke="#111" stroke-width="3.5" stroke-linejoin="round"
