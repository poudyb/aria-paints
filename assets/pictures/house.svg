    <line x1="338" y1="16" x2="338" y2="6"/>
    <line x1="338" y1="92" x2="338" y2="102"/>
    <line x1="300" y1="54" x2="290" y2="54"/>
    <line x1="376" y1="54" x2="386" y2="54"/>
    <line x1="311" y1="27" x2="304" y2="20"/>
    <line x1="365" y1="81" x2="372" y2="88"/>
    <line x1="311" y1="81" x2="304" y2="88"/>
    <line x1="365" y1="27" x2="372" y2="20"/>
    <!-- Extra smoke puffs -->
    <circle cx="288" cy="40" r="7" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <circle cx="302" cy="26" r="5" fill="#fff" stroke="#111" stroke-width="2.5"/>
    <!-- Roof shingles -->
    <line x1="120" y1="176" x2="280" y2="176"/>
    <line x1="130" y1="160" x2="270" y2="160"/>
    <line x1="142" y1="144" x2="258" y2="144"/>
    <!-- Round attic window -->
    <circle cx="200" cy="156" r="13"/>
    <line x1="200" y1="143" x2="200" y2="169"/>
    <line x1="187" y1="156" x2="213" y2="156"/>
    <!-- Window crosses -->
    <line x1="151" y1="216" x2="151" y2="258"/>
    <line x1="130" y1="237" x2="172" y2="237"/>
    <line x1="249" y1="216" x2="249" y2="258"/>
    <line x1="228" y1="237" x2="270" y2="237"/>
    <!-- Tree branch hint -->
    <path d="M 92 248 L 108 228"/>
    <!-- Flower leaves -->
    <ellipse cx="136" cy="322" rx="9" ry="5" transform="rotate(-30 136 322)"/>
    <ellipse cx="246" cy="324" rx="9" ry="5" transform="rotate(25 246 324)"/>
    <ellipse cx="314" cy="326" rx="9" ry="5" transform="rotate(-20 314 326)"/>
    <ellipse cx="360" cy="318" rx="8" ry="4" transform="rotate(20 360 318)"/>
    <!-- Bush by house -->
    <path d="M 294 300 Q 276 276 294 260 Q 312 244 330 260 Q 348 276 330 300 Q 312 316 294 300 Z"/>
    <!-- Door details -->
    <circle cx="218" cy="266" r="4" fill="#111"/>
    <path d="M 186 276 Q 200 290 214 276"/>
  </g>
