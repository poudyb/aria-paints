  <ellipse id="flower4Petal1" class="paint-section" cx="375" cy="314" rx="7" ry="11" fill="#fff" stroke="#111" stroke-width="3.5"/>
  <ellipse id="flower4Petal2" class="paint-section" cx="388" cy="324" rx="7" ry="11" fill="#fff" stroke="#111" stroke-width="3.5" transform="rotate(90 388 324)"/>
  <ellipse id="flower4Petal3" class="paint-section" cx="375" cy="336" rx="7" ry="11" fill="#fff" stroke="#111" stroke-width="3.5" transform="rotate(180 375 336)"/>
  <ellipse id="flower4Petal4" class="paint-section" cx="362" cy="324" rx="7" ry="11" fill="#fff" stroke="#111" stroke-width="3.5" transform="rotate(270 362 324)"/>
  <circle id="flower4Center" class="paint-section" cx="375" cy="326" r="7" fill="#fff" stroke="#111" stroke-width="3.5"/>

  <g class="decor-line" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round">
